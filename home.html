  <body class="d-flex flex-column min-vh-100">
    <header>
      <!-- Inizio Navbar -->
      <nav
        class="navbar navbar-expand-md bg-body-tertiary px-3 position-fixed top-0 w-100 z-1"
      >
        <div class="container-fluid">
          <a class="navbar-brand" href="./home.html">CRUD-azon</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"

            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="./home.html"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./backoffice.html">Backoffice</a>
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Search"
                aria-label="Search"
              />
              <button class="btn btn-outline-danger" type="submit">
                Search
              </button>
            </form>
          </div>
        </div>
      </nav>
      <!-- Fine Navbar -->
    </header>
    <main class="flex-grow-1 my-5 py-5">
      <div id="error-message"></div>
      <div class="container text-center mb-4">
        <h1>Ecco i prodotti disponibili</h1>
        <div
          id="loading-spinner"
          class="spinner-border text-primary ms-2"
          role="status"

        </div>
        <p>
          Clicca sulle immagini per visualizzare i dettagli o vai nel
          <a href="./backoffice.html" class="link-info">Backoffice</a> per
          aggiungerne di nuovi.
        </p>

        <div id="products-row" class="row g-4 justify-content-center"></div>
      </div>
